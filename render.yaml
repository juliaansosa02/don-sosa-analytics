services:
  - type: web
    name: don-sosa
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm run start -w @don-sosa/api
    autoDeploy: true
    envVars:
      - key: RIOT_API_KEY
        sync: false
      - key: RIOT_PLATFORM
        value: la2
      - key: RIOT_REGION
        value: americas
      - key: MATCH_COUNT
        value: "100"
      - key: RIOT_REQUEST_DELAY_MS
        value: "700"
      - key: RIOT_MAX_RETRIES
        value: "4"
      - key: CORS_ORIGIN
        value: https://don-sosa.onrender.com
      - key: VITE_API_BASE_URL
        value: https://don-sosa.onrender.com/api
      - key: DATABASE_URL
        sync: false
